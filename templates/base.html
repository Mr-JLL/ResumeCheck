<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}华阳精机简历筛选系统{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <a href="{{ url_for('dashboard') }}" class="brand">华阳精机简历筛选</a>
    <nav class="nav">
      <a href="{{ url_for('dashboard') }}">首页</a>
      <a href="{{ url_for('search_page') }}">🔍 搜索</a>
      <a href="{{ url_for('talent_pool_page') }}" id="nav-pool">⏰ 人才池</a>
      <a href="{{ url_for('funnel_page') }}">漏斗看板</a>
      <a href="{{ url_for('new_job_page') }}">新增岗位</a>
      <a href="{{ url_for('database_page') }}">数据库</a>
      <a href="{{ url_for('learning_page') }}">学习报告</a>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span>© 华阳精机 · 本地系统 · v2.0</span>
  </footer>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
  <script>
  (async () => {
    try {
      const r = await fetch('/api/talent_pool/due');
      const d = await r.json();
      if (d.ok && d.count > 0) {
        const a = document.getElementById('nav-pool');
        if (a) {
          const b = document.createElement('span');
          b.textContent = d.count;
          b.style.cssText = 'display:inline-flex;align-items:center;justify-content:center;'
            + 'min-width:17px;height:17px;border-radius:9px;background:#e74c3c;'
            + 'color:#fff;font-size:10px;font-weight:800;margin-left:4px;padding:0 4px;vertical-align:middle';
          a.appendChild(b);
        }
      }
    } catch(_) {}
  })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
